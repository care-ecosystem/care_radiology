apiVersion: v1
kind: Secret
metadata:
  name: radiology-secrets
  namespace: care
  labels:
    app: care-radiology
type: Opaque
stringData:
  # LDAP credentials (radiology-specific)
  LDAP_ADMIN_PASSWORD: "CHANGE_ME_LDAP_ADMIN_PASSWORD"  # ⚠️ CHANGE THIS
  LDAP_CONFIG_PASSWORD: "CHANGE_ME_LDAP_CONFIG_PASSWORD"  # ⚠️ CHANGE THIS

  # Wildfly/DCM4CHEE credentials (radiology-specific)
  WILDFLY_ADMIN_USER: "admin"
  WILDFLY_ADMIN_PASSWORD: "CHANGE_ME_WILDFLY_PASSWORD"  # ⚠️ CHANGE THIS

  # Note: PostgreSQL, Redis, and MinIO credentials are in care-secrets
  # This secret only contains radiology-specific credentials
