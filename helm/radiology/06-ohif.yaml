---
apiVersion: v1
kind: ConfigMap
metadata:
  name: radiology-ohif-config
  namespace: care
  labels:
    app: care-radiology
    component: ohif
data:
  app-config.js: |
    window.config = {
      routerBasename: '/',
      showStudyList: true,
      maxNumRequests: {
        interaction: 100,
        thumbnail: 75,
        prefetch: 25,
      },
      dataSources: [
        {
          friendlyName: 'Care Radiology PACS',
          namespace: '@ohif/extension-default.dataSourcesModule.dicomweb',
          sourceName: 'dicomweb',
          configuration: {
            name: 'DCM4CHEE Production',
            wadoUriRoot: 'https://radiology.care-k3s.digit.org/dicomweb',
            qidoRoot: 'https://radiology.care-k3s.digit.org/dicomweb',
            wadoRoot: 'https://radiology.care-k3s.digit.org/dicomweb',
            qidoSupportsIncludeField: true,
            supportsReject: true,
            imageRendering: 'wadors',
            thumbnailRendering: 'wadors',
            enableStudyLazyLoad: true,
            supportsFuzzyMatching: true,
            supportsWildcard: true,
            staticWado: true,
            singlepart: 'bulkdata,video',
            bulkDataURI: {
              enabled: true,
            },
          },
        },
      ],
      defaultDataSourceName: 'dicomweb',
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radiology-ohif
  namespace: care
  labels:
    app: care-radiology
    component: ohif
spec:
  replicas: 2
  selector:
    matchLabels:
      app: care-radiology
      component: ohif
  template:
    metadata:
      labels:
        app: care-radiology
        component: ohif
    spec:
      containers:
      - name: ohif
        image: ohif/app:latest
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: ohif-config
          mountPath: /usr/share/nginx/html/app-config.js
          subPath: app-config.js
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: ohif-config
        configMap:
          name: radiology-ohif-config
---
apiVersion: v1
kind: Service
metadata:
  name: radiology-ohif
  namespace: care
  labels:
    app: care-radiology
    component: ohif
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: care-radiology
    component: ohif
