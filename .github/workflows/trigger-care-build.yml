name: Trigger CARE Backend Build

on:
  push:
    branches: [main, develop]
    # No paths restriction - triggers on ANY change

jobs:
  trigger-backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CARE Backend Docker Build
        id: dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CARE_REPO_DISPATCH_TOKEN }}
          repository: care-ecosystem/care
          event-type: radiology-plugin-updated
          client-payload: '{"plugin": "care_radiology", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

      - name: Verify dispatch sent
        run: |
          echo "Dispatch event sent successfully"
          echo "Target repository: care-ecosystem/care"
          echo "Event type: radiology-plugin-updated"
          echo "Triggered from: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "Check for workflow run at:"
          echo "https://github.com/care-ecosystem/care/actions"
          echo ""
          echo "Note: It may take 1-2 minutes for the workflow to appear"
