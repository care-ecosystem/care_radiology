version: "3.9"

services:

  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.8-34.1
    ports:
      - "3890:389"


  arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.1
    environment:
      POSTGRES_DB: dicom
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      WILDFLY_WAIT_FOR: ldap:389 
    depends_on:
      - ldap
      # - db
    ports:
      - "8080:8080"

  ohif:
    image: ohif/app:v3.9.2
    platform: linux/amd64
    ports:
      - "3000:80"