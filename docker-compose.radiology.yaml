version: "3.9"

services:

  ldap:
    image: ghcr.io/care-ecosystem/slapd-dcm4chee:sha-fc44ffa
    ports:
      - "3890:389"
    environment:
      - STORAGE_URI=jclouds:s3:http://host.docker.internal:9100
      - STORAGE_BUCKET_NAME=dicom-bucket
      - STORAGE_BUCKET_ENDPOINT=http://host.docker.internal:9100
      - STORAGE_BUCKET_PASSWORD=minioadmin
      - STORAGE_BUCKET_USERNAME=minioadmin
      - STORAGE_BUCKET_PATHSTYLE=true
      - STORAGE_BUCKET_VIRTHOST=false


  arc:
    image: dcm4che/dcm4chee-arc-psql:5.34.1
    environment:
      POSTGRES_DB: dicom
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      WILDFLY_WAIT_FOR: ldap:389
    depends_on:
      - ldap
    ports:
      - "8080:8080"

  ohif:
    image: ohif/app:v3.9.2
    platform: linux/amd64
    ports:
      - "3000:80"
    volumes:
      - ./docker/ohif/app-config.js:/usr/share/nginx/html/app-config.js

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - arc
      - ohif
    ports:
      - "32314:80"