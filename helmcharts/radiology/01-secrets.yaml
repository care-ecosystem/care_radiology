---
# Radiology-specific secrets
# These are the default credentials from dcm4che/slapd-dcm4chee image
apiVersion: v1
kind: Secret
metadata:
  name: radiology-secrets
  namespace: care
  labels:
    app: care-radiology
type: Opaque
stringData:
  # LDAP credentials (dcm4che/slapd-dcm4chee defaults)
  # Change these in production
  LDAP_ADMIN_PASSWORD: "secret"
  LDAP_CONFIG_PASSWORD: "secret"

  # WildFly admin credentials
  # Used for DCM4CHEE admin console
  WILDFLY_ADMIN_USER: "admin"
  WILDFLY_ADMIN_PASSWORD: "admin"
