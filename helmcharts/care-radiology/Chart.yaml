apiVersion: v2
name: care-radiology
description: Complete Care Radiology stack with PACS, DICOM viewer, and dependencies
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - dicom
  - pacs
  - radiology
  - healthcare
  - dcm4chee
  - ohif
home: https://github.com/10bedicu/care_radiology
maintainers:
  - name: Care Development Team
    email: care-dev@ohc.network

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    tags:
      - database

  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    tags:
      - cache

  - name: minio
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
    tags:
      - storage
