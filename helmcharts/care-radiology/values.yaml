# Care Radiology Helm Chart Values
# This is the main values file for deploying the complete Care Radiology stack

global:
  # Domain configuration
  domain: care.local
  # Image pull policy
  imagePullPolicy: IfNotPresent
  # Storage class for persistent volumes
  storageClass: standard

# PostgreSQL Database (for DCM4CHEE)
postgresql:
  enabled: true
  auth:
    username: postgres
    password: postgres  # CHANGE IN PRODUCTION
    database: dicom
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 1000m
    initdb:
      scripts:
        init-dcm4chee.sql: |
          -- DCM4CHEE database initialization
          CREATE DATABASE dicom;
          \c dicom;

          -- Grant permissions
          GRANT ALL PRIVILEGES ON DATABASE dicom TO postgres;

  metrics:
    enabled: true

# Redis Cache
redis:
  enabled: true
  auth:
    enabled: false  # Enable in production with password
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

# MinIO Object Storage (for DICOM files)
minio:
  enabled: true
  mode: standalone  # Use 'distributed' for production
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin  # CHANGE IN PRODUCTION
  persistence:
    enabled: true
    size: 100Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m
  defaultBuckets: "dicom-storage"

# OpenLDAP (for DCM4CHEE configuration)
ldap:
  enabled: true
  image:
    repository: osixia/openldap
    tag: "1.5.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  env:
    LDAP_ORGANISATION: "DCM4CHEE"
    LDAP_DOMAIN: "dcm4che.org"
    LDAP_ADMIN_PASSWORD: "admin"  # CHANGE IN PRODUCTION
    LDAP_CONFIG_PASSWORD: "config"  # CHANGE IN PRODUCTION

  persistence:
    enabled: true
    size: 1Gi

  service:
    type: ClusterIP
    port: 389

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# DCM4CHEE PACS Archive
dcm4chee:
  enabled: true
  image:
    repository: dcm4che/dcm4chee-arc-psql
    tag: "5.34.1"
    pullPolicy: IfNotPresent

  replicaCount: 1

  env:
    # PostgreSQL connection
    POSTGRES_HOST: care-radiology-postgresql
    POSTGRES_PORT: "5432"
    POSTGRES_DB: dicom
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres  # CHANGE IN PRODUCTION

    # LDAP connection
    LDAP_URL: "ldap://care-radiology-ldap:389"
    LDAP_BASE_DN: "dc=dcm4che,dc=org"
    LDAP_ROOTPASS: "admin"  # CHANGE IN PRODUCTION
    LDAP_CONFIGPASS: "config"  # CHANGE IN PRODUCTION

    # Wildfly settings
    WILDFLY_ADMIN_USER: admin
    WILDFLY_ADMIN_PASSWORD: admin  # CHANGE IN PRODUCTION
    WILDFLY_WAIT_FOR: "ldap:389 postgresql:5432"

    # Archive settings
    ARCHIVE_DEVICE_NAME: "dcm4chee-arc"
    AE_TITLE: "DCM4CHEE"
    DICOM_PORT: "11112"

    # Storage configuration (MinIO)
    STORAGE_ACCESS_KEY: minioadmin  # CHANGE IN PRODUCTION
    STORAGE_SECRET_KEY: minioadmin  # CHANGE IN PRODUCTION
    STORAGE_ENDPOINT: "http://care-radiology-minio:9000"
    STORAGE_BUCKET: "dicom-storage"

  service:
    type: ClusterIP
    ports:
      http: 8080
      dicom: 11112
      hl7: 2575

  persistence:
    enabled: true
    size: 5Gi  # For logs and temporary storage

  resources:
    requests:
      memory: 2Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m

  livenessProbe:
    httpGet:
      path: /dcm4chee-arc/ui2
      port: 8080
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 10

  readinessProbe:
    httpGet:
      path: /dcm4chee-arc/ui2
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5

# OHIF Viewer
ohif:
  enabled: true
  image:
    repository: ohif/viewer
    tag: "v3.9.2"
    pullPolicy: IfNotPresent

  replicaCount: 1

  config:
    # DICOMweb endpoint configuration
    dicomWebEndpoint: "http://care-radiology-nginx/dicomweb"

    # OHIF configuration (app-config.js)
    appConfig: |
      window.config = {
        routerBasename: '/',
        extensions: [],
        modes: [],
        showStudyList: true,
        maxNumRequests: {
          interaction: 100,
          thumbnail: 75,
          prefetch: 25,
        },
        dataSources: [
          {
            friendlyName: 'DCM4CHEE PACS',
            namespace: '@ohif/extension-default.dataSourcesModule.dicomweb',
            sourceName: 'dicomweb',
            configuration: {
              name: 'DCM4CHEE',
              wadoUriRoot: 'http://care-radiology-nginx/dicomweb',
              qidoRoot: 'http://care-radiology-nginx/dicomweb',
              wadoRoot: 'http://care-radiology-nginx/dicomweb',
              qidoSupportsIncludeField: true,
              supportsReject: true,
              imageRendering: 'wadors',
              thumbnailRendering: 'wadors',
              enableStudyLazyLoad: true,
              supportsFuzzyMatching: true,
              supportsWildcard: true,
              staticWado: true,
              singlepart: 'bulkdata,video',
              bulkDataURI: {
                enabled: true,
              },
            },
          },
        ],
      };

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# Nginx Reverse Proxy
nginx:
  enabled: true
  image:
    repository: nginx
    tag: "1.25-alpine"
    pullPolicy: IfNotPresent

  replicaCount: 1

  config:
    # Nginx configuration
    nginx.conf: |
      events {
          worker_connections 1024;
      }

      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;

          upstream ohif {
              server care-radiology-ohif:80;
          }

          upstream arc {
              server care-radiology-dcm4chee:8080;
          }

          server {
              listen 80;
              server_name _;

              # OHIF Viewer
              location / {
                  proxy_pass http://ohif;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # DICOMweb endpoints (requires authentication)
              location /dicomweb/ {
                  # CORS preflight
                  if ($request_method = OPTIONS) {
                      add_header 'Access-Control-Allow-Origin' '*' always;
                      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                      add_header 'Access-Control-Allow-Headers' '*' always;
                      add_header 'Access-Control-Allow-Credentials' 'true' always;
                      return 204;
                  }

                  # Authentication check (calls Care backend)
                  auth_request /authenticate;

                  # Clear authorization headers before proxying to DCM4CHEE
                  proxy_set_header authorization "";
                  proxy_set_header Authorization "";

                  # Proxy to DCM4CHEE
                  proxy_pass http://arc/dcm4chee-arc/aets/DCM4CHEE/rs/;
                  proxy_set_header HOST $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header Accept application/json;
              }

              # Authentication endpoint (internal)
              location = /authenticate {
                  internal;
                  proxy_pass http://care-backend:9000/api/care_radiology/dicom/authenticate/;
                  proxy_set_header HOST $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header Accept application/json;
                  proxy_pass_request_body off;
                  proxy_set_header Content-Length "";
              }

              # DCM4CHEE Management UI (optional)
              location /dcm4chee-arc/ {
                  proxy_pass http://arc;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      }

  service:
    type: LoadBalancer  # Change to NodePort or ClusterIP as needed
    port: 80
    annotations: {}
      # service.beta.kubernetes.io/aws-load-balancer-type: nlb

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m

# Ingress configuration (optional)
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "0"  # No limit for DICOM uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

  hosts:
    - host: radiology.care.local
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: radiology-tls
      hosts:
        - radiology.care.local

# Care Backend integration (existing deployment)
careBackend:
  # This assumes Care backend is already deployed
  serviceName: care-backend
  servicePort: 9000
