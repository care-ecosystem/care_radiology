{{- if .Values.ohif.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "care-radiology.fullname" . }}-ohif
  labels:
    app.kubernetes.io/name: {{ include "care-radiology.name" . }}-ohif
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: viewer
spec:
  type: {{ .Values.ohif.service.type }}
  ports:
  - port: {{ .Values.ohif.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: {{ include "care-radiology.name" . }}-ohif
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
