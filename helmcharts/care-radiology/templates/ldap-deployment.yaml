{{- if .Values.ldap.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "care-radiology.fullname" . }}-ldap
  labels:
    app.kubernetes.io/name: {{ include "care-radiology.name" . }}-ldap
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ldap
spec:
  replicas: {{ .Values.ldap.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "care-radiology.name" . }}-ldap
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "care-radiology.name" . }}-ldap
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: ldap
        image: "{{ .Values.ldap.image.repository }}:{{ .Values.ldap.image.tag }}"
        imagePullPolicy: {{ .Values.ldap.image.pullPolicy }}
        env:
        - name: LDAP_ORGANISATION
          value: {{ .Values.ldap.env.LDAP_ORGANISATION | quote }}
        - name: LDAP_DOMAIN
          value: {{ .Values.ldap.env.LDAP_DOMAIN | quote }}
        - name: LDAP_ADMIN_PASSWORD
          value: {{ .Values.ldap.env.LDAP_ADMIN_PASSWORD | quote }}
        - name: LDAP_CONFIG_PASSWORD
          value: {{ .Values.ldap.env.LDAP_CONFIG_PASSWORD | quote }}
        ports:
        - name: ldap
          containerPort: 389
          protocol: TCP
        - name: ldaps
          containerPort: 636
          protocol: TCP
        volumeMounts:
        - name: ldap-data
          mountPath: /var/lib/ldap
        - name: ldap-config
          mountPath: /etc/ldap/slapd.d
        resources:
          {{- toYaml .Values.ldap.resources | nindent 10 }}
        livenessProbe:
          tcpSocket:
            port: ldap
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: ldap
          initialDelaySeconds: 20
          periodSeconds: 5
      volumes:
      - name: ldap-data
        {{- if .Values.ldap.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "care-radiology.fullname" . }}-ldap-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: ldap-config
        {{- if .Values.ldap.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "care-radiology.fullname" . }}-ldap-config
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
