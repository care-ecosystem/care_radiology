{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "care-radiology.fullname" . }}-nginx
  labels:
    app.kubernetes.io/name: {{ include "care-radiology.name" . }}-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: proxy
  {{- with .Values.nginx.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.nginx.service.type }}
  ports:
  - port: {{ .Values.nginx.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: {{ include "care-radiology.name" . }}-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
